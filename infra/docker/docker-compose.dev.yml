version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: labguard-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: labguard
      POSTGRES_USER: labguard
      POSTGRES_PASSWORD: labguard_dev_password
    ports:
      - "5432:5432"
    volumes:
      - labguard-postgres-data:/var/lib/postgresql/data

volumes:
  labguard-postgres-data:
